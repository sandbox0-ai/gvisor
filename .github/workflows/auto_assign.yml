# This workflow is used to automatically assign PRs to maintainers.
name: Auto Assign

on:
  pull_request_target:
    types: [opened, ready_for_review]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  assign:
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    steps:
    - name: Auto Assign Reviewer (Round Robin MVP)
      uses: actions/github-script@v7
      with:
        script: |-
          const { owner, repo } = context.repo;
          const prNum = context.payload.pull_request.number;
          const pr = context.payload.pull_request;
          const author = pr.user.login;

          // Check if already assigned
          if ((pr.requested_reviewers || []).length > 0 || (pr.assignees || []).length > 0) {
            return;
          }

          // Read active maintainers from your .github/reviewer.json file
          let approvers = [];
          try {
            const { data: fileData } = await github.rest.repos.getContent({
              owner,
              repo,
              path: '.github/reviewer.json',
              ref: context.payload.pull_request.base.ref
            });
            const content = Buffer.from(fileData.content, 'base64').toString('utf8');
            approvers = JSON.parse(content);
          } catch (error) {
            console.log('Could not load .github/reviewer.json:', error.message);
            return;
          }

          if (!Array.isArray(approvers) || approvers.length === 0) {
            console.log('No team members found in .github/reviewer.json.');
            return;
          }

          // Filter out the PR author so they aren't assigned their own PR
          const eligibleApprovers = approvers.filter(login => login !== author);
          if (eligibleApprovers.length === 0) {
            console.log('No eligible approvers available to assign.');
            return;
          }

          // Basic Round Robin
          const selectedMatch = eligibleApprovers[prNum % eligibleApprovers.length];

          // Apply assignment via API calls
          await github.rest.issues.addAssignees({ owner, repo, issue_number: prNum, assignees: [selectedMatch] });
          await github.rest.pulls.requestReviewers({ owner, repo, pull_number: prNum, reviewers: [selectedMatch] });
          console.log(`Successfully assigned and requested review from ${selectedMatch} for PR #${prNum}`);
