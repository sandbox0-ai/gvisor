name: Sync upstream

on:
  schedule:
    - cron: "17 3 * * 1"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: sync-upstream-master
  cancel-in-progress: false

jobs:
  sync:
    if: github.repository == 'sandbox0-ai/gvisor'
    runs-on: ubuntu-latest
    steps:
      - name: Check out the fork
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Merge upstream master into a review branch
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          git config user.name "sandbox0-upstream-sync[bot]"
          git config user.email "sandbox0-upstream-sync[bot]@users.noreply.github.com"
          git remote add upstream https://github.com/google/gvisor.git
          git fetch upstream master
          git fetch origin master
          git switch --force-create sync/upstream-master origin/master

          if git merge-base --is-ancestor upstream/master HEAD; then
            echo "Fork master already contains upstream master."
            exit 0
          fi

          git merge --no-edit upstream/master
          git push --force origin HEAD:refs/heads/sync/upstream-master

          existing_pr="$(
            gh pr list \
              --repo "${GITHUB_REPOSITORY}" \
              --base master \
              --head sync/upstream-master \
              --state open \
              --json number \
              --jq '.[0].number // empty'
          )"
          if [[ -n "${existing_pr}" ]]; then
            echo "Updated upstream sync PR #${existing_pr}."
            exit 0
          fi

          gh pr create \
            --repo "${GITHUB_REPOSITORY}" \
            --base master \
            --head sync/upstream-master \
            --title "chore: sync google/gvisor master" \
            --body $'Merge the latest `google/gvisor:master` into the Sandbox0 fork for review and CI.\n\nThis PR is created by the scheduled upstream sync workflow.'
