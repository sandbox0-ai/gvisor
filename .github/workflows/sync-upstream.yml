name: Sync upstream

on:
  schedule:
    - cron: "17 3 * * 1"
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  pull-requests: read

concurrency:
  group: sync-upstream-master
  cancel-in-progress: false

jobs:
  sync:
    if: github.repository == 'sandbox0-ai/gvisor'
    runs-on: ubuntu-latest
    steps:
      - name: Check out the fork
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Merge upstream master into a review branch
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          issue_marker='<!-- sandbox0-upstream-sync -->'
          existing_issue="$({
            gh issue list \
              --repo "${GITHUB_REPOSITORY}" \
              --state open \
              --limit 100 \
              --json number,body \
              --jq ".[] | select(.body | contains(\"${issue_marker}\")) | .number"
          } | head -n1)"

          git config user.name "sandbox0-upstream-sync[bot]"
          git config user.email "sandbox0-upstream-sync[bot]@users.noreply.github.com"
          git remote add upstream https://github.com/google/gvisor.git
          git fetch upstream master
          git fetch origin master
          git switch --force-create sync/upstream-master origin/master

          if git merge-base --is-ancestor upstream/master HEAD; then
            echo "Fork master already contains upstream master."
            if [[ -n "${existing_issue}" ]]; then
              gh issue close "${existing_issue}" \
                --repo "${GITHUB_REPOSITORY}" \
                --comment "Fork master now contains the latest upstream master."
            fi
            exit 0
          fi

          git merge --no-edit upstream/master
          git push --force origin HEAD:refs/heads/sync/upstream-master

          existing_pr="$(
            gh pr list \
              --repo "${GITHUB_REPOSITORY}" \
              --base master \
              --head sync/upstream-master \
              --state open \
              --json number \
              --jq '.[0].number // empty'
          )"
          if [[ -n "${existing_pr}" ]]; then
            echo "Updated upstream sync PR #${existing_pr}."
            if [[ -n "${existing_issue}" ]]; then
              gh issue close "${existing_issue}" \
                --repo "${GITHUB_REPOSITORY}" \
                --comment "Tracking continues in PR #${existing_pr}."
            fi
            exit 0
          fi

          upstream_commit="$(git rev-parse upstream/master)"
          sync_commit="$(git rev-parse HEAD)"
          compare_url="https://github.com/${GITHUB_REPOSITORY}/compare/master...sync/upstream-master?expand=1"
          issue_body="$(cat <<EOF
          ${issue_marker}
          The scheduled workflow updated \`sync/upstream-master\` with the latest \`google/gvisor:master\`.

          - Upstream commit: \`${upstream_commit}\`
          - Sync commit: \`${sync_commit}\`
          - Review and open the sync PR: ${compare_url}

          GitHub organization policy does not allow \`GITHUB_TOKEN\` to create pull requests, so a maintainer must open the PR from the prepared branch.
          EOF
          )"

          if [[ -n "${existing_issue}" ]]; then
            gh issue edit "${existing_issue}" \
              --repo "${GITHUB_REPOSITORY}" \
              --body "${issue_body}"
            echo "Updated upstream sync issue #${existing_issue}."
            exit 0
          fi

          gh issue create \
            --repo "${GITHUB_REPOSITORY}" \
            --title "chore: review pending google/gvisor sync" \
            --body "${issue_body}"
